<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThumbnailPro | Premium Generator</title>
    <meta name="description" content="Create stunning thumbnails for YouTube, social media, and more. Upload images, add text, and download your high-quality thumbnail.">
    <link rel="stylesheet" href="style.css?v=1.13">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <h1>Thumbnail<span>Pro</span></h1>
            </div>

            <div class="control-group">
                <h3><span class="icon">🖼️</span> Background</h3>
                <div class="upload-area" id="drop-zone">
                    <p>Drop or select image</p>
                    <label for="image-upload" class="btn-primary"><span>📁</span> Upload Image</label>
                    <input type="file" id="image-upload" accept="image/*" hidden>
                </div>
                
                <div class="shadow-controls">
                    <button id="add-fade" class="btn-secondary"><span>🌗</span> Add Bottom Shadow</button>
                    <div id="shadow-edit-controls" class="sub-controls hidden">
                        <div class="input-wrapper">
                            <label>Shadow Height (%)</label>
                            <input type="range" id="shadow-height-slider" min="10" max="100" value="45">
                        </div>
                        <div class="input-wrapper">
                            <label>Shadow Opacity</label>
                            <input type="range" id="shadow-opacity-slider" min="0" max="100" value="85">
                        </div>
                    </div>
                </div>
            </div>

            <div class="control-group">
                <h3><span class="icon">📐</span> Canvas Ratio</h3>
                <div class="input-wrapper">
                    <select id="canvas-preset">
                        <option value="1080x1920" selected>9:16 Ratio (Reels/Shorts)</option>
                        <option value="1280x720">16:9 Ratio (YouTube/Landscape)</option>
                        <option value="1080x1080">1:1 Ratio (Instagram Post)</option>
                    </select>
                </div>
            </div>

            <div class="control-group">
                <h3><span class="icon">✍️</span> Text Editor</h3>
                <div class="grid-2">
                    <button id="add-text" class="btn-secondary"><span>➕</span> Add Text</button>
                    <button id="add-highlight-text" class="btn-secondary highlight-btn"><span>💥</span> Highlight</button>
                </div>
                
                <div id="text-edit-controls" class="sub-controls hidden">
                    <div class="input-wrapper">
                        <label>Text Content</label>
                        <textarea id="text-input" rows="2" placeholder="TYPE HERE..."></textarea>
                    </div>

                    <div class="grid-2" style="margin-bottom: 1rem;">
                        <button id="btn-uppercase" class="btn-ghost" style="padding: 0.5rem; font-size: 0.65rem;">CASE: UPPER</button>
                        <button id="btn-lowercase" class="btn-ghost" style="padding: 0.5rem; font-size: 0.65rem;">CASE: lower</button>
                    </div>
                    
                    <div class="grid-2">
                        <div class="input-wrapper">
                            <label>Size</label>
                            <input type="number" id="font-size" value="160" min="10" max="1000">
                        </div>
                        <div class="input-wrapper">
                            <label>Line Spacing</label>
                            <input type="number" id="line-height" value="0.9" min="0.5" max="3" step="0.1">
                        </div>
                    </div>

                    <div class="grid-2">
                        <div class="input-wrapper">
                            <label>Font Family</label>
                            <select id="font-family">
                                <option value="Poppins" selected>Poppins</option>
                                <option value="Montserrat">Montserrat</option>
                                <option value="Inter">Inter</option>
                                <option value="Outfit">Outfit</option>
                                <option value="Arial">Arial</option>
                            </select>
                        </div>
                        <div class="input-wrapper">
                            <label>Weight</label>
                            <select id="font-weight">
                                <option value="normal">Normal</option>
                                <option value="bold">Bold</option>
                                <option value="800">Extra Bold</option>
                                <option value="900" selected>Black</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid-2">
                        <div class="input-wrapper">
                            <label>Char Space</label>
                            <input type="number" id="char-spacing" value="-40" min="-100" max="500">
                        </div>
                        <div class="input-wrapper">
                            <label>Shadow Blur</label>
                            <input type="number" id="shadow-blur" value="15" min="0" max="100">
                        </div>
                    </div>

                    <div class="grid-2">
                        <div class="input-wrapper">
                            <label>Stroke</label>
                            <input type="number" id="stroke-width" value="0" min="0" max="100">
                        </div>
                        <div class="input-wrapper">
                            <label>Color</label>
                            <div class="color-picker-wrapper">
                                <input type="color" id="text-color" value="#ffffff">
                            </div>
                        </div>
                    </div>

                    <div class="grid-2">
                        <button id="bring-forward" class="btn-ghost">Forward</button>
                        <button id="send-backwards" class="btn-ghost">Backward</button>
                    </div>
                </div>
            </div>

            <div class="actions">
                <button id="download-btn" class="btn-success"><span>💾</span> Download PNG</button>
                <button id="reset-btn" class="btn-ghost">Reset Canvas</button>
            </div>
        </aside>

        <main class="editor-area">
            <div id="scaling-container">
                <div class="canvas-wrapper">
                    <canvas id="main-canvas"></canvas>
                </div>
            </div>
            <div class="editor-hints">
                <p>✨ Drag elements to move • Scroll to zoom • Use keys to delete</p>
            </div>
        </main>
    </div>

    <script src="main.js?v=1.6"></script>
</body>
</html>
