<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Thumbnail Generator</title>
    <meta name="description" content="Create stunning thumbnails for YouTube, social media, and more. Upload images, add text, and download your high-quality thumbnail.">
    <link rel="stylesheet" href="style.css?v=1.2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700;900&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <h1>Thumbnail<span>Pro</span></h1>
            </div>

            <div class="control-group">
                <h3><span class="icon">🖼️</span> Background</h3>
                <div class="upload-area" id="drop-zone">
                    <p>Drag & drop or</p>
                    <label for="image-upload" class="btn-primary">Choose Image</label>
                    <input type="file" id="image-upload" accept="image/*" hidden>
                </div>
            </div>

            <div class="control-group">
                <h3><span class="icon">✍️</span> Text Controls</h3>
                <div class="grid-2">
                    <button id="add-text" class="btn-secondary">White Text</button>
                    <button id="add-highlight-text" class="btn-secondary highlight-btn">Maroon Text</button>
                </div>
                <div class="grid-2">
                    <button id="bring-forward" class="btn-ghost">Bring to Front</button>
                    <button id="send-backwards" class="btn-ghost">Send to Back</button>
                </div>
                
                <div id="text-edit-controls" class="sub-controls hidden">
                    <div class="input-wrapper">
                        <label>Content</label>
                        <textarea id="text-input" rows="2" placeholder="Enter text..."></textarea>
                    </div>
                    
                    <div class="grid-2">
                        <div class="input-wrapper">
                            <label>Font Size</label>
                            <input type="number" id="font-size" value="60" min="10" max="500">
                        </div>
                        <div class="input-wrapper">
                            <label>Text Color</label>
                            <div class="color-picker-wrapper">
                                <input type="color" id="text-color" value="#ffffff">
                            </div>
                        </div>
                    </div>

                    <div class="input-wrapper">
                        <label>Font Family</label>
                        <select id="font-family">
                            <option value="Montserrat">Montserrat (Recommended)</option>
                            <option value="Inter">Inter</option>
                            <option value="Outfit">Outfit</option>
                            <option value="Arial">Arial</option>
                            <option value="Impact">Impact</option>
                        </select>
                    </div>

                    <div class="grid-2">
                        <div class="input-wrapper">
                            <label>Stroke Width</label>
                            <input type="number" id="stroke-width" value="0" min="0" max="20">
                        </div>
                        <div class="input-wrapper">
                            <label>Stroke Color</label>
                            <input type="color" id="stroke-color" value="#000000">
                        </div>
                    </div>
                </div>
            </div>

            <div class="control-group">
                <h3><span class="icon">📐</span> Canvas Size</h3>
                <div class="input-wrapper">
                    <select id="canvas-preset">
                        <option value="1080x1920" selected>Vertical Shorts (1080x1920)</option>
                        <option value="1280x720">YouTube Thumbnail (1280x720)</option>
                        <option value="1920x1080">Full HD (1920x1080)</option>
                        <option value="1080x1080">Instagram Square (1080x1080)</option>
                    </select>
                </div>
            </div>

            <div class="actions">
                <button id="download-btn" class="btn-success">Download Thumbnail</button>
                <button id="reset-btn" class="btn-ghost">Reset All</button>
            </div>
        </aside>

        <main class="editor-area">
            <div class="canvas-wrapper">
                <canvas id="main-canvas"></canvas>
            </div>
            <div class="editor-hints">
                <p>💡 Tip: You can drag and resize text directly on the canvas!</p>
            </div>
        </main>
    </div>

    <script src="main.js"></script>
</body>
</html>
